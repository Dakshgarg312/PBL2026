<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Item</title>
<style>
body{font-family:Arial;background:#f4f4f4}
.container{width:320px;margin:50px auto;background:#fff;padding:20px;border-radius:10px}
input,textarea{width:100%;padding:10px;margin:5px 0}
button{padding:10px;width:100%}
</style>
</head>
<body>

<div class="container">
<h2>Report Found Item</h2>

<form action="/cgi-bin/upload.py" method="POST" enctype="multipart/form-data">
<input type="text" name="name" placeholder="Item Name" required>
<textarea name="desc" placeholder="Description"></textarea>
<input type="text" name="location" placeholder="Found Location">
<input type="date" name="date">
<input type="file" name="image" required>
<button type="submit">Submit</button>
</form>

<br>
<button onclick="location.href='index.html'">Back</button>

</div>

</body>
</html>
