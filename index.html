<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost & Found</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#333;color:#fff;padding:15px;text-align:center}
.container{padding:20px}
input{padding:10px;width:60%}
button{padding:10px;margin-top:10px}
iframe{width:100%;height:500px;border:none;margin-top:20px}
</style>
</head>
<body>

<header>
<h1>Lost & Found System</h1>

<form action="/cgi-bin/search.py" method="GET" target="results">
<input type="text" name="query" placeholder="Search item...">
<button type="submit">Search</button>
</form>

<br>

<button onclick="location.href='upload.html'">Report Found Item</button>
<button onclick="location.href='admin.html'">Admin Panel</button>

</header>

<div class="container">
<h2>Available Items</h2>

<!-- Backend output will appear here -->
<iframe name="results" src="/cgi-bin/display.py"></iframe>

</div>

</body>
</html>
