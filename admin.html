<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
body{font-family:Arial;background:#f4f4f4}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.card{background:#fff;padding:10px;border-radius:10px}
img{width:100%;height:150px;object-fit:cover;border-radius:10px}
button{padding:8px;margin-top:5px;width:100%}
</style>
</head>
<body>

<div class="container">
<h1>Admin Panel - Manage Items</h1>
<div class="grid" id="items"></div>
</div>

<script>
let items = JSON.parse(localStorage.getItem("items")) || []

function display(){
let container = document.getElementById("items")
container.innerHTML=""

items.forEach((item,index)=>{
container.innerHTML+=`
<div class="card">
<img src="${item.image}">
<h3>${item.name}</h3>
<p>${item.location}</p>
<p><b>Status:</b> ${item.status || "available"}</p>

<button onclick="markReturned(${index})">Mark as Returned</button>
<button onclick="deleteItem(${index})">Delete Item</button>
</div>`
})
}

function markReturned(index){
items[index].status = "returned"
localStorage.setItem("items",JSON.stringify(items))
display()
}

function deleteItem(index){
if(confirm("Are you sure?")){
items.splice(index,1)
localStorage.setItem("items",JSON.stringify(items))
display()
}
}

display()
</script>

</body>
</html>
