
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost & Found</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#333;color:#fff;padding:15px;text-align:center}
.container{padding:20px}
input{padding:10px;width:80%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:20px}
.card{background:#fff;padding:10px;border-radius:10px;cursor:pointer}
.card img{width:100%;height:150px;object-fit:cover;border-radius:10px}
button{padding:10px;margin-top:10px}
</style>
</head>
<body>

<header>
<h1>Lost & Found</h1>
<input type="text" id="search" placeholder="Search item..." onkeyup="searchItem()">
<br>
<button onclick="location.href='upload.html'">Report Found Item</button>
<button onclick="location.href='admin.html'">Admin Panel</button>
</header>

<div class="container">
<div class="grid" id="items"></div>
</div>

<script>
let items = JSON.parse(localStorage.getItem("items")) || []

function display(data){
let container = document.getElementById("items")
container.innerHTML=""
data.forEach((item,index)=>{
container.innerHTML+=`
<div class="card" onclick="viewItem(${index})">
<img src="${item.image}">
<h3>${item.name}</h3>
<p>${item.location}</p>
</div>`
})
}

function searchItem(){
let val=document.getElementById("search").value.toLowerCase()
let filtered=items.filter(i=>i.name.toLowerCase().includes(val) && i.status!=="returned")
display(filtered)
}

function viewItem(index){
localStorage.setItem("viewIndex",index)
location.href="view.html"
}

let availableItems = items.filter(i => i.status !== "returned")
display(availableItems)
</script>

</body>
</html>
