<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
body{font-family:Arial;background:#f4f4f4}
.container{padding:20px}
iframe{width:100%;height:400px;border:none;margin-bottom:20px}
input{padding:10px;width:250px}
button{padding:10px}
</style>
</head>
<body>

<div class="container">
<h1>Admin Panel</h1>

<h3>All Items</h3>
<iframe src="/cgi-bin/admin_display.py"></iframe>

<h3>Mark Item as Returned</h3>
<form action="/cgi-bin/mark.py" method="POST">
<input type="text" name="id" placeholder="Enter Item ID" required>
<button type="submit">Mark Returned</button>
</form>

<br>

<h3>Delete Item</h3>
<form action="/cgi-bin/delete.py" method="POST">
<input type="text" name="id" placeholder="Enter Item ID" required>
<button type="submit">Delete</button>
</form>

</div>

</body>
</html>
